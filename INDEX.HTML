<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .header {
        height: 120px;
        width: 750px;
        background-color: rgb(248, 158, 158);
        margin-left: 12px;
    }

    .nav {
        height: 80px;
        width: 750px;
        background-color: rgb(248, 158, 158);
        margin: 12px;
        display: flex;
        justify-content: end;
        align-items: center;
    }

    div {
        height: 55px;
        width: 100px;
        background-color: aliceblue;

        margin-right: 15px;
    }

    .big {
        height: 440px;
        width: 750px;

        margin-left: 12px;
        display: flex;
    }

    .small {
        height: 440px;
        width: 440px;
        background-color: rgb(134, 182, 236);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 15px;



    }

    .usmall {
        height: 440px;
        width: 300px;
        background-color: rgb(202, 195, 195);
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }

    .threeboxes {
        height: 90px;
        width: 350px;
        background-color: rgb(230, 223, 223);
        margin-top: 20px;
        opacity: 80%;

    }

    .twoboxes {
        height: 90px;
        width: 250px;
        background-color: rgb(223, 217, 217);
        margin: 10px;

    }

    .footer {

        height: 120px;
        width: 750px;
        background-color: rgb(248, 158, 158);
        margin-left: 12px;
        margin-top: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .submit{
        height: 50px;
        width: 100px;
        background-color: orange;
        border-radius: 15px;
        
    }
    .submit:hover{
        box-shadow: 0px 0px 30px rgb(102, 101, 100);
    
    }
</style>

<body>
    <div class="header"></div>
    <div class="nav">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>
    <!-- main -->
    <div class="big">
        <div class="small">
            <div class="threeboxes"></div>
            <div class="threeboxes"></div>
            <div class="threeboxes"></div>

        </div>





        <div class="usmall">

            <div class="twoboxes"></div>
            <div class="twoboxes"></div>
        </div>
    </div>

    <div class="footer">
<button class="submit"><a href="snap.jpg">SUMIT!</a></button>
    </div>

</body>

</html>
